# CI workflow - test + lint
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: realtyiq
          POSTGRES_PASSWORD: realtyiq_dev
          POSTGRES_DB: realtyiq_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run linting (ruff)
        working-directory: backend
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key
          DATABASE_URL: postgresql+asyncpg://realtyiq:realtyiq_dev@localhost:5432/realtyiq_db
          REDIS_URL: redis://localhost:6379
        run: pytest -v
